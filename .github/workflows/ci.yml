name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. a new push to an open PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: build & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: unit tests
        # Explicit bash => pipefail, so tee can't mask a test failure.
        shell: bash
        run: go test -v ./... 2>&1 | tee /tmp/test-output.log

      - name: PII scan of test output
        # Failing runs are the likeliest to leak PII, so scan even then.
        if: always()
        uses: hoophq/alcatraz-action@0ea580df1a2914b82e02a1eb40fb2fdebb6decd8 # v1
        with:
          mode: files
          paths: /tmp/test-output.log
          comment: false # step summary only; keeps this workflow contents:read

  e2e:
    name: e2e (postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      # The e2e test provisions its own postgres:16-alpine via `docker run`
      # (Docker is preinstalled on ubuntu-latest), so no service container here.
      - name: e2e tests
        # Explicit bash => pipefail, so tee can't mask a test failure.
        shell: bash
        run: go test -v -tags e2e -count=1 ./e2e/ 2>&1 | tee /tmp/e2e-output.log

      - name: PII scan of e2e output
        # Failing runs are the likeliest to leak PII, so scan even then.
        if: always()
        uses: hoophq/alcatraz-action@0ea580df1a2914b82e02a1eb40fb2fdebb6decd8 # v1
        with:
          mode: files
          paths: /tmp/e2e-output.log
          comment: false # step summary only; keeps this workflow contents:read

  release-check:
    name: release config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: check
