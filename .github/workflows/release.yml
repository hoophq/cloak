name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the GitHub Release
  id-token: write # cosign keyless signing via GitHub OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history for the changelog
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@v3
        with:
          # Pin cosign: the floating latest (v2.5.2) regressed the GitHub-Actions
          # ambient-OIDC fetch used for keyless signing (ATR-94).
          cosign-release: "v2.4.1"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # A PAT (or GitHub App token) with write access to hoophq/homebrew-tap.
          # Add it as a repo secret before cutting the first release, or the
          # Homebrew step fails; everything else still publishes.
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
